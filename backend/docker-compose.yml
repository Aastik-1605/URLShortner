services:
 app:
  build: .
  ports:
   - "5000:5000"
  environment:
   MONGO_URI: mongodb://mongodb:27017/url-shortener
   REDIS_URL: redis://redis:6379
   PORT: 5000
   BASE_URL: http://localhost:5000
  depends_on:
   - mongodb
   - redis
   
 mongodb:
  image: mongo:7
  volumes:
   - mongo-data:/data/db
 
 redis:
  image: redis:7
  ports:
   - "6379:6379"

volumes:
  mongo-data: